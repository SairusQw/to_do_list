{% extends "base.html" %}

{% block content %}
  <div class="container-fluid p-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold text-dark mb-1">Керування тегами</h2>
        <p class="text-muted small">Впорядковано за алфавітом</p>
      </div>
      <a href="{% url 'todo:tag_create' %}" class="btn btn-primary shadow-sm px-4">
        <i class="bi bi-plus-circle-fill me-2"></i>Новий тег
      </a>
    </div>

    <div class="row g-3">
      {% for tag in tag_list %}
        <div class="col-md-4 col-lg-3">
          <div class="card border-0 shadow-sm h-100 tag-card">
            <div class="card-body d-flex justify-content-between align-items-center p-3">
              <div class="d-flex align-items-center">
                <div class="tag-icon-wrapper me-3">
                  <i class="bi bi-hash fs-5"></i>
                </div>
                <span class="fw-bold text-dark">{{ tag.name }}</span>
              </div>

              <div class="tag-actions">
                <a href="{% url 'todo:tag-update' tag.id %}" class="btn btn-link btn-sm p-1 text-primary"
                   title="Редагувати">
                  <i class="bi bi-pencil"></i>
                </a>
                <a href="{% url 'todo:tag-delete' tag.id %}" class="btn btn-link btn-sm p-1 text-danger"
                   title="Видалити">
                  <i class="bi bi-trash3"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      {% empty %}
        <div class="col-12 text-center py-5">
          <i class="bi bi-tags text-muted display-1"></i>
          <p class="mt-3 text-muted">Тегів ще не створено. Час додати перший!</p>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
