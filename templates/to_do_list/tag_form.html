{% extends "base.html" %}

{% block content %}
  <div class="container mt-4" style="max-width: 500px;">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'todo:tag_list' %}">Теги</a></li>
        <li class="breadcrumb-item active">Новий тег</li>
      </ol>
    </nav>

    <div class="card shadow-sm mt-3">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Створити новий тег</h5>
      </div>
      <div class="card-body">
        <form action="" method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.name.id_for_label }}" class="form-label">Назва тегу</label>
            {{ form.name }}
            {% if form.name.errors %}
              {% for error in form.name.errors %}
                <div class="text-danger small mt-1">{{ error }}</div>
              {% endfor %}
            {% endif %}
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Зберегти</button>
            <a href="{% url 'todo:tag_list' %}" class="btn btn-outline-secondary">Скасувати</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
